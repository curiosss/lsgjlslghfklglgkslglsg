name: commerce
description: "E-commerce mobile app for household chemicals, cosmetics and home goods."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^15.1.2

  # State Management & DI
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Images
  cached_network_image: ^3.4.1

  # Icons
  lucide_icons: ^0.257.0

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
