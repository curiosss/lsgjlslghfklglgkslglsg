  version: "1.0"
paths:
  /admin/admins:
    get:
      description: Get all admin users (superadmin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_meransoft_commerce-backend_internal_models.ApiResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_meransoft_commerce-backend_internal_models.AdminResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_meransoft_commerce-backend_internal_models.ApiResponse'
      security:
      - BearerAuth: []
      summary: List all admins
      tags:
      - Admins
    post:
      consumes:
      - application/json
      description: Create a new admin user (superadmin only)
      parameters:
      - description: Admin data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_meransoft_commerce-backend_internal_models.CreateAdminRequest'
      produces:
      - application/json
      responses:
