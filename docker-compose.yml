services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: commerce_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U commerce -d commerce_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=commerce
      - DB_PASSWORD=secret
      - DB_NAME=commerce_db
      - DB_SSLMODE=disable
      - SERVER_PORT=8080
      - SERVER_MODE=debug
      - JWT_SECRET=commerce-super-secret-key-change-in-production
      - JWT_EXPIRY=24h
      - JWT_REFRESH_EXPIRY=168h
      - UPLOAD_DIR=./uploads
      - UPLOAD_MAX_SIZE=10485760
      - BASE_URL=http://localhost:8080
    volumes:
      - ./backend/uploads:/app/uploads

  # admin:
  #   build: ./admin
  #   ports:
  #     - "3001:80"
  #   depends_on:
  #     - server

  web:
    build: ./web_client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - BACKEND_URL=http://server:8080

volumes:
  postgres_data:
